name: Airtable Email Automation

on:
  workflow_dispatch:
    inputs:
      campaign_name:
        description: "Optional: exact Airtable Campaign Name to process"
        required: false
        type: string
      force:
        description: "Force process this campaign even if Automation Status is not Scheduled"
        required: false
        default: false
        type: boolean
      run_mode:
        description: "demo = max 3 campaigns, production = all matching campaigns"
        required: true
        default: "demo"
        type: choice
        options:
          - demo
          - production

  schedule:
    - cron: "*/30 * * * *"

  issues:
    types:
      - opened

permissions:
  contents: write
  issues: write

concurrency:
  group: airtable-email-automation
  cancel-in-progress: false

jobs:
  run-automation:
    if: github.event_name != 'issues' || github.event.issue.title == 'EMAIL_AUTOMATION_RUN'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run Airtable email automation
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: ${{ secrets.AIRTABLE_TABLE_NAME }}

          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPO: olvrdb/email-automation-live
          GITHUB_BRANCH: main

          KLAVIYO_KEY: MOCK
          SHOPIFY_URL: https://example.com

          SHOPIFY_STORES_JSON: ${{ secrets.SHOPIFY_STORES_JSON }}
          SHOPIFY_API_VERSION: ${{ secrets.SHOPIFY_API_VERSION }}

          EMAIL_WIDTH: 600
          EMAIL_SLICE_HEIGHT: 900

          CAMPAIGN_NAME_INPUT: ${{ github.event.inputs.campaign_name || '' }}
          FORCE_INPUT: ${{ github.event.inputs.force || 'false' }}
          RUN_MODE_INPUT: ${{ github.event.inputs.run_mode || 'demo' }}
          ISSUE_TITLE: ${{ github.event.issue.title || '' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          RUN_MODE="$RUN_MODE_INPUT"
          CAMPAIGN_NAME="$CAMPAIGN_NAME_INPUT"
          FORCE_CAMPAIGN="$FORCE_INPUT"

          if [ "$EVENT_NAME" = "issues" ]; then
            PREFIX="EMAIL_AUTOMATION_RUN::"
            CAMPAIGN_NAME="${ISSUE_TITLE#"$PREFIX"}"
            FORCE_CAMPAIGN="true"
            RUN_MODE="demo"

            echo "Issue trigger detected."
            echo "Issue title: $ISSUE_TITLE"
            echo "Campaign from issue title: $CAMPAIGN_NAME"
          fi

          echo "Run mode: $RUN_MODE"

          MAX_ARGS=""
          if [ "$RUN_MODE" = "demo" ]; then
            MAX_ARGS="--max 3"
            echo "Demo mode enabled: processing max 3 campaigns."
          else
            echo "Production mode enabled: processing all matching campaigns."
          fi

          if [ -n "$CAMPAIGN_NAME" ]; then
            echo "Running one Airtable campaign: $CAMPAIGN_NAME"

            if [ "$FORCE_CAMPAIGN" = "true" ]; then
              node run-airtable.js --campaign "$CAMPAIGN_NAME" --force $MAX_ARGS
            else
              node run-airtable.js --campaign "$CAMPAIGN_NAME" $MAX_ARGS
            fi
          else
            echo "Running Airtable queue"
            node run-airtable.js $MAX_ARGS
          fi

      - name: Comment and close trigger issue on success
        if: github.event_name == 'issues' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "Email automation completed successfully for this Airtable-triggered campaign."
          gh issue close "${{ github.event.issue.number }}" --reason completed

      - name: Comment on trigger issue failure
        if: github.event_name == 'issues' && failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "Email automation failed. Check the workflow run logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"