name: Airtable Email Automation

on:
  workflow_dispatch:
    inputs:
      campaign_name:
        description: "Optional: exact Airtable Campaign Name to process"
        required: false
        type: string
      force:
        description: "Force process this campaign even if Automation Status is not Scheduled"
        required: false
        default: false
        type: boolean

  schedule:
    # Runs every 30 minutes in UTC.
    # Scheduled runs process normal Approved + Scheduled campaigns.
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: airtable-email-automation
  cancel-in-progress: false

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run Airtable email automation
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: ${{ secrets.AIRTABLE_TABLE_NAME }}

          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPO: olvrdb/email-automation-live
          GITHUB_BRANCH: main

          KLAVIYO_KEY: MOCK
          SHOPIFY_URL: https://example.com

          EMAIL_WIDTH: 600
          EMAIL_SLICE_HEIGHT: 900

          CAMPAIGN_NAME: ${{ github.event.inputs.campaign_name }}
          FORCE_CAMPAIGN: ${{ github.event.inputs.force }}
        run: |
          if [ -n "$CAMPAIGN_NAME" ]; then
            echo "Running one Airtable campaign: $CAMPAIGN_NAME"

            if [ "$FORCE_CAMPAIGN" = "true" ]; then
              node run-airtable.js --campaign "$CAMPAIGN_NAME" --force
            else
              node run-airtable.js --campaign "$CAMPAIGN_NAME"
            fi
          else
            echo "Running all Approved + Scheduled Airtable campaigns"
            node run-airtable.js
          fi